<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>FocusGuard — Time Limit Reached</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      font-family: "Manrope", system-ui, -apple-system, sans-serif;
      background: linear-gradient(165deg, oklch(0.32 0.09 285), oklch(0.22 0.06 280));
      color: #fff;
      overflow: hidden;
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(55px);
      pointer-events: none;
    }
    .glow.a { top: -120px; right: -80px; width: 340px; height: 340px; background: oklch(0.6 0.16 300 / 0.25); }
    .glow.b { bottom: -120px; left: -90px; width: 360px; height: 360px; background: oklch(0.55 0.14 260 / 0.25); }

    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 380px;
      width: 100%;
    }

    .badge-icon {
      width: 96px; height: 96px;
      border-radius: 28px;
      background: oklch(1 0 0 / 0.1);
      border: 1px solid oklch(1 0 0 / 0.16);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
    }
    .badge-ring {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 3.5px solid #fff;
      position: relative;
    }
    .badge-ring::before, .badge-ring::after {
      content: "";
      position: absolute; top: 50%; left: 50%;
      height: 2.8px; background: #fff; border-radius: 2px;
      transform-origin: left center;
    }
    .badge-ring::before { width: 14px; transform: translate(0, -50%) rotate(-55deg); }
    .badge-ring::after { width: 11px; transform: translate(0, -50%) rotate(40deg); }

    .eyebrow {
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: oklch(0.82 0.06 290);
      margin-top: 32px;
    }
    h1 {
      font-size: 32px; font-weight: 800; letter-spacing: -0.025em;
      margin: 12px 0 0; line-height: 1.15;
    }
    h1 .domain { font-family: "DM Mono", monospace; font-weight: 500; }
    .lede {
      font-size: 15.5px; line-height: 1.55;
      color: oklch(0.86 0.02 285);
      max-width: 300px; margin: 16px 0 0;
    }
    .lede b { color: #fff; }

    .stats { display: flex; gap: 28px; margin-top: 32px; align-items: stretch; }
    .stat { text-align: center; }
    .stat-val { font-size: 28px; font-weight: 800; font-family: "DM Mono", monospace; letter-spacing: -0.02em; }
    .stat-label { font-size: 12px; color: oklch(0.75 0.03 285); font-weight: 600; margin-top: 2px; }
    .stat-divider { width: 1px; background: oklch(1 0 0 / 0.15); }

    .actions { display: flex; flex-direction: column; gap: 11px; width: 100%; margin-top: 38px; }
    .btn {
      width: 100%; border: none; cursor: pointer;
      font-family: inherit; border-radius: 14px;
      transition: background 0.14s ease;
    }
    .btn-solid {
      background: #fff; color: oklch(0.3 0.08 285);
      font-weight: 700; font-size: 15px; padding: 15px;
    }
    .btn-solid:hover { background: oklch(0.95 0.01 285); }
    .btn-ghost {
      background: oklch(1 0 0 / 0.08); color: #fff;
      border: 1px solid oklch(1 0 0 / 0.2);
      font-weight: 600; font-size: 14px; padding: 13px;
    }
    .btn-ghost:hover { background: oklch(1 0 0 / 0.14); }
    .btn:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>

<body>
  <div class="glow a"></div>
  <div class="glow b"></div>

  <div class="card">
    <div class="badge-icon"><div class="badge-ring"></div></div>

    <div class="eyebrow">Daily limit reached</div>
    <h1>Time's up on<br><span class="domain" id="websiteName">this website</span></h1>
    <p class="lede">You've used your <b id="limitText">daily limit</b> here today. Take a breath — this site opens again tomorrow.</p>

    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="spentVal">—</div>
        <div class="stat-label">spent today</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-val" id="countdown">—</div>
        <div class="stat-label">until reset</div>
      </div>
    </div>

    <div class="actions">
      <button id="closeTab" class="btn btn-solid">Close this tab</button>
      <button id="snooze" class="btn btn-ghost">Give me 5 more minutes</button>
    </div>
  </div>

  <script src="blocked.js"></script>
</body>

</html>
