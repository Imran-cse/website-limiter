<!DOCTYPE html>
<html>

<head>
  <title>Website Time Limiter</title>
  <link rel="stylesheet" href="/styles/global.css">
</head>

<body>
  <h1>Website Time Limiter</h1>

  <!-- Website Selector -->
  <div class="website-selector">
    <select id="websiteSelect">
      <option value="">-- Select Website --</option>
      <!-- Websites will be populated here -->
    </select>
    <button id="addCurrentButton" class="action-button">Add Current Site</button>
  </div>

  <!-- Current Website Stats -->
  <div class="time-display" id="statsContainer">
    <h2 id="currentWebsite">Select a website</h2>
    <p>Time Spent Today: <span id="timeSpent">0:00</span></p>
    <div class="progress-container">
      <div id="timeProgress" class="progress-bar"></div>
    </div>
    <p class="time-remaining" id="timeRemaining"></p>
  </div>

  <!-- Website Settings -->
  <div class="settings">
    <label for="timeLimit">Daily Time Limit (minutes):</label>
    <input type="number" id="timeLimit" min="1" max="480" value="30">
    <button id="saveButton">Save Limit</button>
    <div class="website-actions">
      <button id="resetTimeButton" class="secondary-button">Reset Time</button>
      <button id="removeWebsiteButton" class="warning-button">Remove Website</button>
    </div>
  </div>

  <!-- Add New Website Form -->
  <div class="add-website">
    <h3>Add New Website</h3>
    <div class="form-group">
      <label for="newWebsiteDomain">Domain (e.g., facebook.com):</label>
      <input type="text" id="newWebsiteDomain" placeholder="example.com">
    </div>
    <div class="form-group">
      <label for="newWebsiteLimit">Time Limit (minutes):</label>
      <input type="number" id="newWebsiteLimit" min="1" max="480" value="30">
    </div>
    <button id="addWebsiteButton" class="primary-button">Add Website</button>
  </div>

  <!-- Debug Section -->
  <div class="debug-section">
    <button id="refreshButton" class="neutral-button">Refresh Stats</button>
    <button id="resetSettingsButton" class="danger-button">Reset All Settings</button>
    <div id="debugInfo"></div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
